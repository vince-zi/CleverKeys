Builds:
  - versionName: 1.1.64
    versionCode: 101641
    commit: v1.1.64
    gradle:
      - yes
    output: build/outputs/apk/release/*armeabi-v7a*.apk
    binary: https://github.com/tribixbite/CleverKeys/releases/download/v%v/CleverKeys-v%v-armeabi-v7a.apk
    srclibs:
      - reproducible-apk-tools@v0.3.0
    prebuild:
      - rm -rf $$SDK$$/platforms/android-34
      - sdkmanager 'platforms;android-34' 'build-tools;34.0.0'
      - sed -i -e "s/include 'armeabi-v7a'.*/include 'armeabi-v7a'/" build.gradle
    postbuild:
      - python3 -c "import zipfile,sys,os,tempfile,shutil;a=sys.argv[1];t=tempfile.mktemp('.apk');z=zipfile.ZipFile(a);o=zipfile.ZipFile(t,'w');[o.writestr(i,z.read(i.filename))for
        i in z.infolist()if not(i.filename.startswith('META-INF/com/')or i.filename.startswith('META-INF/services/'))];z.close();o.close();shutil.move(t,a)"
        $$OUT$$
      - $$reproducible-apk-tools$$/inplace-fix.py --page-size 16 --internal fix-pg-map-id
        $$OUT$$ 0000000

