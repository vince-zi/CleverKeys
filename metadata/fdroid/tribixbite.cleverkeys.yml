AllowedAPKSigningKeys: 3c70de8852fca5bb279c9998d558ea7606131f1f937af35cc943eee1aedfb97e

# Manual update mode: ABI-split builds with binary verification need a
# coordinated triple of Builds entries per release, so auto-update isn't
# safe here. Bump CurrentVersion/CurrentVersionCode below at each release
# and add three new Builds entries above (armv7, arm64, x86_64) following
# the versionCode scheme `base*10 + abiCode` (1=armv7, 2=arm64, 3=x86_64).
AutoUpdateMode: None
UpdateCheckMode: Tags ^v[\d.]+$
CurrentVersion: 1.3.0
CurrentVersionCode: 103003
